name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
          
          # Replace YOUR_HF_USERNAME and YOUR_SPACE_NAME with your actual Hugging Face details
          git push --force https://mandy-07:$HF_TOKEN@huggingface.co/spaces/mandy-07/medai-backend main
